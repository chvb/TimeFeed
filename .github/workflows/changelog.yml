name: Changelog generieren

on:
  push:
    branches: [master]

jobs:
  changelog:
    runs-on: ubuntu-latest
    # Nicht auf eigene Bot-Commits reagieren (Endlosschleife vermeiden)
    if: "!contains(github.event.head_commit.message, '[changelog-bot]')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Changelog aus Commits generieren
        run: python3 scripts/generate-changelog.py

      - name: Changelog committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md VERSION package.json client/package.json server/package.json
          if git diff --cached --quiet; then
            echo "Keine Changelog-Änderungen"
          else
            NEW_VER=$(cat VERSION)
            git commit -m "Changelog v${NEW_VER} automatisch aktualisiert [changelog-bot]"
            git push
          fi
