version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3030:3030"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3030
      - JWT_SECRET=your-super-secret-jwt-key-for-development
      - JWT_EXPIRE_TIME=7d
      - DATABASE_URL=sqlite:/app/database.sqlite
      - CORS_ORIGIN=http://localhost:3031,https://timefeed.de
    networks:
      - timefeed-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3031:3031"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3030/api
    depends_on:
      - server
    networks:
      - timefeed-network

networks:
  timefeed-network:
    driver: bridge